# docker-compose.yml
version: '3.8'

services:
  postgres:
    image: postgres:16
    container_name: myapp-postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: myapp
    ports:
      - "5440:5432"
    volumes:
      - postgres_data_myapp:/var/lib/postgresql/data

volumes:
  postgres_data_myapp: